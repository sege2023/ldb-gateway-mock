<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — ldbAfrica Demo</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .merchant-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0f9f0;
      color: #166534;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .merchant-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 8px; }
    p.subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #2563eb; }
    input:disabled { background: #f9fafb; color: #6b7280; }

    .amount-row {
      display: flex;
      align-items: center;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    .currency-tag {
      padding: 12px 16px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      border-right: 1.5px solid #e5e7eb;
      white-space: nowrap;
    }

    .amount-row input {
      border: none;
      border-radius: 0;
    }

    .amount-row input:focus { outline: none; }

    .btn-pay {
      width: 100%;
      padding: 14px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-pay:hover { background: #333; }
    .btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }

    .powered-by {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
    }

    .powered-by span { color: #2563eb; font-weight: 600; }

    #error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="merchant-badge">Ade's Electronics</div>
  <h1>Complete your payment</h1>
  <p class="subtitle">Enter your details to pay with crypto via ldbAfrica.</p>

  <form id="checkout-form">
    <div class="form-group">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
      />
    </div>

    <div class="form-group">
      <label for="amount">Amount (NGN)</label>
      <div class="amount-row">
        <span class="currency-tag">₦ NGN</span>
        <input
          type="number"
          id="amount"
          name="amount"
          placeholder="5000"
          min="100"
          required
        />
      </div>
    </div>

    <button type="submit" class="btn-pay" id="pay-btn">
      Pay with Crypto →
    </button>

    <div id="error-msg"></div>
  </form>

  <div class="powered-by">Secured by <span>ldbAfrica</span> Gateway</div>
</div>

<script>
  // Hardcoded merchant API key — in production this is a server-side
  // integration (the merchant's backend calls /initialize, not the browser).
  // Mock only: client-side for demo simplicity.
  const MERCHANT_API_KEY = 'ldb_test_sk_adE3l9Xmq7Zp2Kv';

  document.getElementById('checkout-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const amountNgn = parseFloat(document.getElementById('amount').value);
    const btn = document.getElementById('pay-btn');
    const errorDiv = document.getElementById('error-msg');

    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Initializing...';

    try {
      const res = await fetch('/initialize', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${MERCHANT_API_KEY}`,
        },
        body: JSON.stringify({ email, amount_ngn: amountNgn }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Failed to initialize session.');
      }

      // Redirect to gateway with session ID
      window.location.href = `/gateway?session_id=${data.session_id}`;

    } catch (err) {
      errorDiv.textContent = err.message;
      errorDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Pay with Crypto →';
    }
  });
</script>

</body>
</html>
